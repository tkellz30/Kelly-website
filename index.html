<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" width="680" height="300">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow" x="-5%" y="-20%" width="115%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0099bb"/>
    </linearGradient>
    <!-- Embed Orbitron-style font via Google Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="300" fill="#080c10" rx="14"/>

  <!-- Ambient glow behind icon -->
  <circle cx="120" cy="120" r="85" fill="rgba(0,229,255,0.05)"/>

  <!-- ══ ICON ══ -->
  <!-- Trunk base -->
  <line x1="120" y1="172" x2="120" y2="228" stroke="#00e5ff" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Left branch -->
  <path d="M120 152 Q86 152 78 128" fill="none" stroke="#00e5ff" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Right branch -->
  <path d="M120 152 Q154 152 162 128" fill="none" stroke="#00e5ff" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Center stem -->
  <line x1="120" y1="152" x2="120" y2="110" stroke="#00e5ff" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Left node -->
  <circle cx="68" cy="112" r="30" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="68" cy="112" r="30" fill="none" stroke="#080c10" stroke-width="8"/>
  <circle cx="68" cy="112" r="11" fill="#080c10" opacity="0.45"/>

  <!-- Right node -->
  <circle cx="172" cy="112" r="30" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="172" cy="112" r="30" fill="none" stroke="#080c10" stroke-width="8"/>
  <circle cx="172" cy="112" r="11" fill="#080c10" opacity="0.45"/>

  <!-- Top center node -->
  <circle cx="120" cy="72" r="34" fill="url(#nodeGrad)" filter="url(#softglow)"/>
  <circle cx="120" cy="72" r="34" fill="none" stroke="#080c10" stroke-width="8"/>
  <circle cx="120" cy="72" r="13" fill="#080c10" opacity="0.45"/>

  <!-- ══ WORDMARK ══ -->
  <!-- TRI in white -->
  <text
    x="232" y="162"
    font-family="'Orbitron', 'Arial Black', sans-serif"
    font-weight="900"
    font-size="82"
    fill="#e8edf2"
    letter-spacing="2">TRI</text>

  <!-- TECH in cyan -->
  <text
    x="399" y="162"
    font-family="'Orbitron', 'Arial Black', sans-serif"
    font-weight="900"
    font-size="82"
    fill="#00e5ff"
    letter-spacing="2"
    filter="url(#textglow)">TECH</text>

  <!-- Divider line -->
  <line x1="232" y1="174" x2="655" y2="174" stroke="rgba(0,229,255,0.2)" stroke-width="1"/>

  <!-- BY TREA -->
  <text
    x="232" y="198"
    font-family="'Share Tech Mono', 'Courier New', monospace"
    font-size="15"
    fill="#6b7f8f"
    letter-spacing="10">BY TREA</text>

</svg>
